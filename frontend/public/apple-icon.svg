<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <rect width="180" height="180" rx="36" fill="#000000"/>

  <!-- Outer orbital halo -->
  <circle cx="90" cy="90" r="72" stroke="#3a3a3a" stroke-width="3" stroke-dasharray="9 9" fill="none"/>

  <!-- Inner targeting reticle -->
  <circle cx="90" cy="90" r="52" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.45" fill="none"/>

  <!-- Crosshair ticks -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <line x1="90" y1="14" x2="90" y2="32"/>
    <line x1="90" y1="148" x2="90" y2="166"/>
    <line x1="14" y1="90" x2="32" y2="90"/>
    <line x1="148" y1="90" x2="166" y2="90"/>
  </g>

  <!-- Asteroid body -->
  <path d="M70 60 L100 53 L120 70 L122 96 L107 120 L80 124 L62 105 L58 78 Z"
        fill="#e8dfd0" stroke="#a07c54" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded right side -->
  <path d="M93 56 L120 70 L122 96 L107 120 L86 122 L97 96 Z"
        fill="#9c7e58" opacity="0.55"/>

  <!-- Craters -->
  <circle cx="76" cy="80" r="3.6" fill="#3a2a1a"/>
  <circle cx="103" cy="84" r="3.0" fill="#3a2a1a"/>
  <circle cx="90" cy="102" r="2.5" fill="#3a2a1a"/>
  <circle cx="86" cy="92" r="1.8" fill="#3a2a1a"/>

  <!-- Targeting lock highlight -->
  <circle cx="120" cy="70" r="4.5" fill="#ef4444"/>
</svg>
