# CLIFF — Docker Compose (development)
#
# Run:
#   docker compose up -d                       # redis + backend + frontend
#   docker compose --profile monitoring up -d  # adds prometheus + grafana
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000  (docs: /docs, metrics: /metrics)
# Redis:    redis://localhost:6379
#
# Production deploys should use real registry images and HTTPS termination
# upstream of this compose file (e.g. Caddy / nginx / Cloudflare).

services:
  redis:
    image: redis:7-alpine
    container_name: cliff-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [cliff-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cliff-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-meta/llama-4-maverick-instruct}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      INGEST_INTERVAL_SECONDS: ${INGEST_INTERVAL_SECONDS:-1800}
      RISK_REFRESH_SECONDS: ${RISK_REFRESH_SECONDS:-3600}
      WATCHLIST_SIZE: ${WATCHLIST_SIZE:-30}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks: [cliff-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cliff-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks: [cliff-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: cliff-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [cliff-net]
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: cliff-grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-cliff_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [cliff-net]
    depends_on:
      - prometheus

networks:
  cliff-net:
    driver: bridge
    name: cliff-net

volumes:
  redis_data:
    name: cliff-redis-data
  prometheus_data:
    name: cliff-prometheus-data
  grafana_data:
    name: cliff-grafana-data
