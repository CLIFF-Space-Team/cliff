# CLIFF — notcome.app reverse proxy
#
# Public entrypoint for the VPS. Sits behind Cloudflare.
#   /            → frontend (Next.js, 127.0.0.1:3000)
#   /api/v1/     → backend  (FastAPI,  127.0.0.1:8000)
#   /ws/         → backend WebSocket (upgrade)
#   /health,/healthz,/docs,/openapi.json → backend
#   /metrics is deliberately NOT proxied (keep Prometheus private)
#
# One server block listens on BOTH 80 and 443 with the same content, so it
# works regardless of the Cloudflare SSL mode (Flexible hits :80, Full hits
# :443). Cloudflare's "Always Use HTTPS" handles the public http→https
# redirect, so the origin must NOT redirect (avoids a proxy loop).
#
# Cert lives at /etc/nginx/ssl/notcome.app/{fullchain,privkey}.pem — starts as
# self-signed, swap in a Cloudflare Origin cert for "Full (strict)".

upstream cliff_frontend { server 127.0.0.1:3000; keepalive 32; }
upstream cliff_backend  { server 127.0.0.1:8000; keepalive 32; }

# ── Restore the real visitor IP from Cloudflare ───────────────────────────
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name notcome.app www.notcome.app;

    ssl_certificate     /etc/nginx/ssl/notcome.app/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/notcome.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Let's Encrypt HTTP-01 challenge (used only if you switch off Cloudflare
    # proxy for the origin and issue a cert directly).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;

    # ── Backend REST API ──────────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass http://cliff_backend;
        proxy_read_timeout 60s;
    }

    # ── Backend WebSocket ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://cliff_backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Backend health + docs (no /metrics) ───────────────────────────────
    location = /health      { proxy_pass http://cliff_backend; }
    location = /healthz     { proxy_pass http://cliff_backend; }
    location = /openapi.json { proxy_pass http://cliff_backend; }
    location /docs          { proxy_pass http://cliff_backend; }
    location /redoc         { proxy_pass http://cliff_backend; }

    # ── Frontend (Next.js) — everything else ──────────────────────────────
    location / {
        proxy_pass http://cliff_frontend;
    }
}
